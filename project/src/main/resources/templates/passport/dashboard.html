<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{passport/layout :: appLayout('Tableau de bord','Vue d ensemble du compte SwiftVisa',${activeMenu},${accountName},${accountRole},~{::main})}">
<main>
    <style>
        .dashboard-content {
            padding: 1.4rem;
            display: grid;
            gap: 1rem;
        }

        .hero {
            background: linear-gradient(135deg, #0b6e4f 0%, #1f7a5d 45%, #289f78 100%);
            color: #ffffff;
            border-radius: 1rem;
            padding: 1.2rem;
        }

        .hero h2 {
            margin: 0 0 0.45rem;
            font-size: 1.4rem;
        }

        .hero p {
            margin: 0;
            color: #dbfff2;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.8rem;
        }

        .card-metric {
            background: #ffffff;
            border: 1px solid #d7dde8;
            border-radius: 0.9rem;
            padding: 0.9rem;
        }

        .card-metric .label {
            margin: 0;
            font-size: 0.8rem;
            color: #667487;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-metric .value {
            margin: 0.35rem 0 0;
            font-size: 1.55rem;
            color: #1a2533;
            font-weight: 700;
        }

        .quick-actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .action-btn {
            text-decoration: none;
            border: 1px solid #b9c8db;
            color: #16304d;
            border-radius: 0.7rem;
            padding: 0.55rem 0.9rem;
            font-weight: 600;
            background: #f7fbff;
        }

        @media (max-width: 900px) {
            .grid-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <div class="dashboard-content">
        <section class="hero">
            <h2>Bienvenue sur votre espace SwiftVisa</h2>
            <p>Depuis cette page principale, vous pouvez consulter les passeports, suivre les dossiers et acceder aux options de compte.</p>
        </section>

        <section class="grid-cards">
            <article class="card-metric">
                <p class="label">Passeports en base</p>
                <p class="value" th:text="${passportCount}">0</p>
            </article>
            <article class="card-metric">
                <p class="label">Role actif</p>
                <p class="value" th:text="${accountRole}">USER</p>
            </article>
            <article class="card-metric">
                <p class="label">Compte</p>
                <p class="value" th:text="${accountName}">Compte demo</p>
            </article>
        </section>

        <section class="quick-actions">
            <a class="action-btn" th:href="@{/passports}">Voir les passeports</a>
            <a class="action-btn" th:href="@{/}">Rafraichir le dashboard</a>
        </section>
    </div>
</main>
</html>
