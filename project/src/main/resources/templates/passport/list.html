<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{passport/layout :: appLayout('Liste des passeports','Donnees chargees depuis la table passport',${activeMenu},${accountName},${accountRole},~{::main})}">
<main>
    <style>
        .table-wrapper {
            padding: 1.2rem;
        }

        .table thead th {
            white-space: nowrap;
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
        }
    </style>

    <div class="table-wrapper">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Numero</th>
                    <th scope="col">Date de delivrance</th>
                    <th scope="col">Date d'expiration</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(passports)}">
                    <td colspan="4" class="text-center text-muted">Aucun passeport disponible.</td>
                </tr>
                <tr th:each="passport : ${passports}">
                    <td th:text="${passport.id}">1</td>
                    <td th:text="${passport.numero}">P100001</td>
                    <td th:text="${passport.dateDelivrance}">2020-01-15</td>
                    <td th:text="${passport.dateExpiration}">2030-01-15</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</html>
