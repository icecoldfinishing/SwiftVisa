<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftVisa - Liste des passeports</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <style>
        body {
            background: linear-gradient(120deg, #f7f9fc 0%, #e9f4ff 100%);
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .page-wrapper {
            max-width: 960px;
            margin: 3rem auto;
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 12px 30px rgba(4, 45, 84, 0.12);
            overflow: hidden;
        }

        .page-header {
            background: #0d6efd;
            color: white;
            padding: 1.5rem 2rem;
        }

        .table-wrapper {
            padding: 1.5rem 2rem 2rem;
        }

        .table thead th {
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-wrapper">
        <div class="page-header">
            <h1 class="h3 mb-1">Liste des passeports</h1>
            <p class="mb-0">Donnees chargees depuis la table passport</p>
        </div>

        <div class="table-wrapper">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Numero</th>
                        <th scope="col">Date de delivrance</th>
                        <th scope="col">Date d'expiration</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(passports)}">
                        <td colspan="4" class="text-center text-muted">Aucun passeport disponible.</td>
                    </tr>
                    <tr th:each="passport : ${passports}">
                        <td th:text="${passport.id}">1</td>
                        <td th:text="${passport.numero}">P100001</td>
                        <td th:text="${passport.dateDelivrance}">2020-01-15</td>
                        <td th:text="${passport.dateExpiration}">2030-01-15</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
