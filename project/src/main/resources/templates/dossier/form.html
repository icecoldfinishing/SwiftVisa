<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{passport/layout :: appLayout('Nouveau dossier','Creation d une demande',${activeMenu},${accountName},${accountRole},~{::main})}">
<main>
    <style>
        .form-wrap { padding: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.8rem; }
        .block { border: 1px solid #d7dde8; border-radius: 0.8rem; padding: 0.9rem; margin-bottom: 0.9rem; background: #fff; }
        .block h3 { margin: 0 0 0.8rem; font-size: 1rem; }
        .line { display: grid; gap: 0.35rem; margin-bottom: 0.65rem; }
        .line label { font-size: 0.86rem; color: #3b4856; }
        .line input, .line select, .line textarea { border: 1px solid #c8d2df; border-radius: 0.55rem; padding: 0.48rem 0.6rem; }
        .docs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.45rem; }
        .doc-item { display: flex; gap: 0.45rem; align-items: start; }
        .doc-item.is-hidden { display: none; }
        .doc-item.is-required strong { color: #0e6648; }
        .required-badge {
            display: inline-flex;
            margin-left: 0.35rem;
            padding: 0.1rem 0.4rem;
            border-radius: 999px;
            background: #dff6ea;
            color: #0e6648;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .hint { color: #5f6e7d; font-size: 0.8rem; }
        .actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
        .btn-main { border: 0; background: #0b6e4f; color: #fff; border-radius: 0.6rem; padding: 0.55rem 0.95rem; font-weight: 700; }
        .btn-link { border: 1px solid #c6d1df; background: #f8fbff; color: #1e3347; border-radius: 0.6rem; padding: 0.55rem 0.95rem; text-decoration: none; font-weight: 700; }
        .alert { border-radius: 0.65rem; padding: 0.65rem 0.8rem; margin-bottom: 0.8rem; }
        .ok { background: #dff6ea; color: #0e6648; border: 1px solid #b7e9d3; }
        .err { background: #fde6e6; color: #9a2f2f; border: 1px solid #f5c3c3; }
        @media (max-width: 900px) { .grid, .docs { grid-template-columns: 1fr; } }
    </style>

    <div class="form-wrap">
        <div th:if="${successMessage}" class="alert ok" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert err" th:text="${errorMessage}"></div>

        <form id="dossierForm" th:action="@{/dossiers}" th:object="${dossierForm}" method="post">
            <div class="block">
                <h3>Visa</h3>
                <div class="grid">
                    <div class="line">
                        <label>Categorie visa</label>
                        <select th:field="*{idCategorieVisa}" required>
                            <option value="">Selectionner</option>
                            <option th:each="cat : ${visaCategories}" th:value="${cat.id}" th:text="${cat.libelle}"></option>
                        </select>
                    </div>
                    <div class="line">
                        <label>Lieu</label>
                        <input type="text" th:field="*{lieuVisa}" required>
                    </div>
                    <div class="line">
                        <label>Date entree</label>
                        <input type="date" th:field="*{dateEntreeVisa}" required>
                    </div>
                    <div class="line">
                        <label>Date expiration</label>
                        <input type="date" th:field="*{dateExpirationVisa}" required>
                    </div>
                </div>
                <div class="line">
                    <label>Motif demande</label>
                    <textarea th:field="*{motifDemande}" rows="2" required></textarea>
                </div>
            </div>

            <div class="block">
                <h3>Etat civil</h3>
                <div class="grid">
                    <div class="line"><label>Nom</label><input type="text" th:field="*{nom}" required></div>
                    <div class="line"><label>Prenom</label><input type="text" th:field="*{prenom}" required></div>
                    <div class="line"><label>Nom jeune fille (optionnel)</label><input type="text" th:field="*{nomJeuneFille}"></div>
                    <div class="line"><label>Date naissance</label><input type="date" th:field="*{dateNaissance}" required></div>
                    <div class="line"><label>Lieu naissance</label><input type="text" th:field="*{lieuNaissance}" required></div>
                    <div class="line">
                        <label>Situation familiale</label>
                        <select th:field="*{situationFamiliale}" required>
                            <option value="">Selectionner</option>
                            <option th:each="sit : ${situationsFamiliales}" th:value="${sit.id}" th:text="${sit.libelle}"></option>
                        </select>
                    </div>
                    <div class="line">
                        <label>Nationalite</label>
                        <select th:field="*{nationalite}" required>
                            <option value="">Selectionner</option>
                            <option th:each="nat : ${nationalites}" th:value="${nat.id}" th:text="${nat.libelle}"></option>
                        </select>
                    </div>
                    <div class="line"><label>Contact</label><input type="text" th:field="*{contact}" required></div>
                </div>
                <div class="line"><label>Adresse</label><input type="text" th:field="*{adresse}" required></div>
            </div>

            <div class="block">
                <h3>Passport</h3>
                <div class="grid">
                    <div class="line"><label>Numero</label><input type="text" th:field="*{numeroPassport}" required></div>
                    <div class="line"><label>Date delivrance</label><input type="date" th:field="*{dateDelivrancePassport}" required></div>
                    <div class="line"><label>Date expiration</label><input type="date" th:field="*{dateExpirationPassport}" required></div>
                </div>
            </div>

            <div class="block">
                <h3>Pieces justificatives</h3>
                <p class="hint">Les pieces obligatoires dependent de la categorie de visa selectionnee.</p>
                <div class="docs">
                    <label
                        class="doc-item"
                        th:each="doc : ${documents}"
                        th:attr="data-available-cats=${availableCategoriesByDocument[doc.id]},data-required-cats=${requiredCategoriesByDocument[doc.id]}"
                    >
                        <input class="doc-check" type="checkbox" th:field="*{uploadedDocumentIds}" th:value="${doc.id}">
                        <span>
                            <strong th:text="${doc.libelle}"></strong>
                            <small class="required-badge" hidden>Obligatoire</small>
                            <small class="hint" th:text="' ID: ' + ${doc.id}"></small>
                        </span>
                    </label>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn-main">Creer le dossier</button>
                <a th:href="@{/dossiers}" class="btn-link">Voir la liste</a>
            </div>
        </form>
    </div>

    <script>
        (function () {
            const form = document.getElementById("dossierForm");
            const categorySelect = document.getElementById("idCategorieVisa");
            const docItems = Array.from(document.querySelectorAll(".doc-item"));

            if (!form || !categorySelect || docItems.length === 0) {
                return;
            }

            const parseCategories = (raw) => {
                if (!raw) {
                    return [];
                }
                const matches = String(raw).match(/\d+/g);
                return matches ? matches : [];
            };

            const updateDocumentsState = () => {
                const selectedCategory = categorySelect.value;

                docItems.forEach((item) => {
                    const check = item.querySelector(".doc-check");
                    const requiredBadge = item.querySelector(".required-badge");
                    const availableCategories = parseCategories(item.dataset.availableCats);
                    const requiredCategories = parseCategories(item.dataset.requiredCats);

                    const isAvailable =
                        !selectedCategory ||
                        availableCategories.length === 0 ||
                        availableCategories.includes(selectedCategory);

                    const isRequired =
                        !!selectedCategory &&
                        requiredCategories.includes(selectedCategory) &&
                        isAvailable;

                    item.classList.toggle("is-hidden", !isAvailable);
                    item.classList.toggle("is-required", isRequired);
                    requiredBadge.hidden = !isRequired;
                    check.disabled = !isAvailable;

                    if (!isAvailable) {
                        check.checked = false;
                    }

                    if (isRequired) {
                        check.checked = true;
                    }
                });
            };

            categorySelect.addEventListener("change", updateDocumentsState);

            form.addEventListener("submit", (event) => {
                const selectedCategory = categorySelect.value;

                if (!selectedCategory) {
                    return;
                }

                const missingRequired = [];
                docItems.forEach((item) => {
                    if (item.classList.contains("is-hidden")) {
                        return;
                    }

                    if (!item.classList.contains("is-required")) {
                        return;
                    }

                    const check = item.querySelector(".doc-check");
                    const label = item.querySelector("strong");
                    if (!check.checked && label) {
                        missingRequired.push(label.textContent);
                    }
                });

                if (missingRequired.length > 0) {
                    event.preventDefault();
                    alert("Pieces obligatoires manquantes :\n- " + missingRequired.join("\n- "));
                }
            });

            updateDocumentsState();
        })();
    </script>
</main>
</html>
