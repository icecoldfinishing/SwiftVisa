<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{passport/layout :: appLayout('Liste des dossiers','Filtres et recherche',${activeMenu},${accountName},${accountRole},~{::main})}">
<main>
    <style>
        .wrap { padding: 1.2rem; display: grid; gap: 0.9rem; }
        .filters { border: 1px solid #d7dde8; border-radius: 0.8rem; background: #fff; padding: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.7rem; }
        .line { display: grid; gap: 0.35rem; }
        .line label { font-size: 0.82rem; color: #5f6e7d; }
        .line input, .line select { border: 1px solid #c8d2df; border-radius: 0.5rem; padding: 0.45rem 0.55rem; }
        .actions { display: flex; gap: 0.5rem; margin-top: 0.7rem; }
        .btn-main { border: 0; background: #0b6e4f; color: #fff; border-radius: 0.6rem; padding: 0.5rem 0.85rem; font-weight: 700; }
        .btn-light { border: 1px solid #c8d2df; background: #f7fbff; color: #203244; border-radius: 0.6rem; padding: 0.5rem 0.85rem; text-decoration: none; font-weight: 700; }
        .table-wrap { border: 1px solid #d7dde8; border-radius: 0.8rem; overflow: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.55rem 0.6rem; border-bottom: 1px solid #e7edf5; font-size: 0.88rem; }
        th { text-transform: uppercase; font-size: 0.74rem; letter-spacing: 0.04em; color: #5f6e7d; background: #f6f9fc; }
        .muted { color: #8a98a8; }
        .ok { background: #dff6ea; color: #0e6648; border: 1px solid #b7e9d3; border-radius: 0.65rem; padding: 0.65rem 0.8rem; }
        .err { background: #fde6e6; color: #9a2f2f; border: 1px solid #f5c3c3; border-radius: 0.65rem; padding: 0.65rem 0.8rem; }
        .btn-validate { border: 0; background: #0f5b8f; color: #fff; border-radius: 0.6rem; padding: 0.4rem 0.7rem; font-weight: 700; }
        .action-group { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>

    <div class="wrap">
        <div th:if="${successMessage}" class="ok" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="err" th:text="${errorMessage}"></div>

        <form method="get" th:action="@{/dossiers}" class="filters">
            <div class="grid">
                <div class="line">
                    <label>Recherche</label>
                    <input type="text" name="recherche" th:value="${recherche}" placeholder="nom, prenom, passeport, motif">
                </div>
                <div class="line">
                    <label>Statut</label>
                    <select name="statut">
                        <option value="">Tous</option>
                        <option value="DOSSIER_CREE" th:selected="${statut == 'DOSSIER_CREE'}">DOSSIER_CREE</option>
                        <option value="DOSSIER_VALIDE" th:selected="${statut == 'DOSSIER_VALIDE'}">DOSSIER_VALIDE</option>
                        <option value="DOCUMENT_SCANNER" th:selected="${statut == 'DOCUMENT_SCANNER'}">DOCUMENT_SCANNER</option>
                    </select>
                </div>
                <div class="line">
                    <label>Categorie visa</label>
                    <select name="idCategorieVisa">
                        <option value="">Toutes</option>
                        <option th:each="cat : ${visaCategories}" th:value="${cat.id}" th:text="${cat.libelle}" th:selected="${idCategorieVisa != null and idCategorieVisa == cat.id}"></option>
                    </select>
                </div>
                <div class="line">
                    <label>Nationalite</label>
                    <select name="idNationalite">
                        <option value="">Toutes</option>
                        <option th:each="nat : ${nationalites}" th:value="${nat.id}" th:text="${nat.libelle}" th:selected="${idNationalite != null and idNationalite == nat.id}"></option>
                    </select>
                </div>
                <div class="line">
                    <label>Date debut</label>
                    <input type="date" name="dateDebut" th:value="${dateDebut}">
                </div>
                <div class="line">
                    <label>Date fin</label>
                    <input type="date" name="dateFin" th:value="${dateFin}">
                </div>
            </div>
            <div class="actions">
                <button class="btn-main" type="submit">Filtrer</button>
                <a class="btn-light" th:href="@{/dossiers}">Reinitialiser</a>
                <a class="btn-light" th:href="@{/dossiers/nouveau}">Nouveau dossier</a>
            </div>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prenom</th>
                    <th>Type demande</th>
                    <th>Type donnees</th>
                    <th>Dossier base</th>
                    <th>Passport</th>
                    <th>Categorie</th>
                    <th>Nationalite</th>
                    <th>Date demande</th>
                    <th>Motif</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(dossiers)}">
                    <td colspan="13" class="muted">Aucun dossier trouve.</td>
                </tr>
                <tr th:each="d : ${dossiers}">
                    <td th:text="${d.id}">1</td>
                    <td th:text="${d.nom}">Nom</td>
                    <td th:text="${d.prenom}">Prenom</td>
                    <td th:text="${d.demandeTypeLibelle}">nouveau titre</td>
                    <td th:text="${d.demandeDonneesLibelle}">sans donnees</td>
                    <td th:text="${d.idDemandeSource}">-</td>
                    <td th:text="${d.numeroPassport}">P0001</td>
                    <td th:text="${d.categorieVisaLibelle}">travailleur</td>
                    <td th:text="${d.nationaliteLibelle}">Malagache</td>
                    <td th:text="${d.dateDemande}">2026-01-01</td>
                    <td th:text="${d.motifDemande}">Motif</td>
                    <td th:text="${d.statut}">DOSSIER_CREE</td>
                    <td>
                        <div class="action-group">
                            <a class="btn-light" th:href="@{/dossiers/{id}/modifier(id=${d.id})}">Modifier</a>
                            <a
                                class="btn-light"
                                th:if="${d.statut == 'DOSSIER_CREE'}"
                                th:href="@{/dossiers/{id}/scanner(id=${d.id})}"
                            >Scanner</a>
                            <form
                                th:if="${d.statut == 'DOSSIER_CREE'}"
                                th:action="@{/dossiers/{id}/valider(id=${d.id})}"
                                method="post"
                            >
                                <button class="btn-validate" type="submit">Valider</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</html>
